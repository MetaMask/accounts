name: Build Speculos Binary

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Speculos version to build'
        required: true
        default: '0.25.13'
  push:
    tags:
      - 'speculos-v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux
          - arch: arm64
            platform: linux

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up QEMU (for arm64 cross-compilation)
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Install speculos
        run: pip install speculos==${{ github.event.inputs.version || '0.25.13' }}

      - name: Build standalone binary
        run: |
          mkdir -p dist
          pyinstaller \
            --onefile \
            --name speculos \
            --distpath dist \
            --workpath build \
            --noupx \
            --collect-all speculos \
            $(python -c 'import speculos; print(speculos.__file__)')

      - name: Package archive
        run: |
          VERSION="${{ github.event.inputs.version || '0.25.13' }}"
          cd dist
          tar -czf speculos-v${VERSION}-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz speculos

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: speculos-v${{ github.event.inputs.version || '0.25.13' }}
          files: dist/*.tar.gz
